name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --verbose
      - run: cargo test --verbose
      # scad-rs (fab-lang) lane. The language crate is NOT a workspace default member, so the
      # steps above (which resolve to fab-scad) never touch it — it needs its own -p steps. Kept
      # separate on purpose: fab-lang carries the pedantic + missing_docs ratchet the older crates
      # don't, so its lint gate can't ride the shared clippy run. fmt --all above already covers it.
      - run: cargo clippy -p fab-lang --all-targets --all-features -- -D warnings
      - run: cargo test -p fab-lang --verbose
      # Parser/lexer coverage gate: 100% LINE + FUNCTION coverage. A DELIBERATE exception scoped to
      # the language crate (chotchki) — NOT a blanket workspace policy; lexers/parsers earn it because
      # an unexercised branch there is a silent mis-tokenization. Region coverage is intentionally NOT
      # gated: infallible-in-context `?` error arms and test-side matches!/assert failure arms are
      # structurally unreachable, so 100% regions would ban idiomatic `?`/`matches!`.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov -p fab-lang --fail-under-lines 100 --fail-under-functions 100
      # fab-jit (I.8): the Cranelift JIT spike. Native-only + not a workspace default member, so its
      # own -p steps. The test suite IS the fast==JIT bit-identity gate (+ the speedup benchmark).
      - run: cargo clippy -p fab-jit --all-targets -- -D warnings
      - run: cargo test -p fab-jit

  # Kani proofs on the evaluator kernels (I.7): panic-freedom on the exact loop that runs untrusted
  # SCAD — range termination, stack pop/pop discipline, tessellation index bounds, guarded shifts. A
  # SEPARATE job on ubuntu (kani's home platform; fab-lang is pure Rust so it builds anywhere) because
  # kani's CBMC toolchain is a heavy install, like the fuzz lane — it must not slow the main macOS build.
  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          working-directory: lang
