# cargo-packager (CrabNebula) — macOS .app + DMG. Spike config (PLAN 18.1): unsigned,
# bundles BOTH binaries (fab-gui is the app, fab CLI rides along in Contents/MacOS).
# Build first: cargo build --release --workspace --bins && cargo packager --release
name = "fab-scad"
product-name = "fab-scad"
identifier = "io.hotchkiss.fab-scad"
version = "1.1.0"
out-dir = "target/packager"
binaries-dir = "target/release"
formats = ["app", "dmg"]
# App icon (navy/gold isometric box) — .icns for macOS, .ico for the Windows NSIS build; cargo-packager
# picks per platform. Regenerate both from packaging/macos/icon.svg via make-icon.sh.
icons = ["packaging/macos/fab-scad.icns", "packaging/macos/fab-scad.ico"]

[[binaries]]
path = "fab-gui"
main = true

[[binaries]]
path = "fab"

# Bevy assets (icon font). Lands in Contents/Resources/assets — assets_dir() in gui/src/main.rs
# knows to look there when the baked dev path is absent.
[[resources]]
src = "gui/assets"
target = "assets"

# The scad libraries (BOSL2 + fab's own scad-lib). Land in Contents/Resources/{libs,scad-lib} — the
# app's PACKED lib root (fab::packed_lib_root, W.3.33), so a pasted model resolves `<BOSL2/…>` with no
# opened file to walk up from. geomsvc's OPENSCADPATH joins root/libs + root/scad-lib, so the two dirs
# must sit side by side under Resources.
[[resources]]
src = "libs"
target = "libs"

[[resources]]
src = "scad-lib"
target = "scad-lib"

# CFBundleVersion pin (W.2.2.1) — without this, cargo-packager stamps a build timestamp and no two
# builds match. The plist MERGES over the generated one (its keys win); it must carry the same
# version as this file — build-app.sh + release-native.yml enforce that.
#
# KEEP THIS SECTION LAST: release-native.yml appends `signing-identity = "…"` to the END of this
# file when the signing secrets exist (a duplicate [macos] header would be a TOML parse error, so
# the append relies on landing inside THIS table). Identity is deliberately not committed — local
# builds and secretless CI dispatches stay unsigned-but-working (see docs/packaging.md "signing").
[macos]
info-plist-path = "packaging/macos/Info.plist"
