name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - run: cargo fmt --all -- --check
      # --workspace on EVERY cargo step (W.7): in a root-package workspace, bare `cargo clippy/test`
      # resolves to fab-scad ONLY — gen/geom/gui/jit/lang/web silently skipped this gate for months.
      # One flag, the whole tree gates; the old per-crate -p test lanes were the workaround and are gone.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace --verbose
      # nextest schedules test BINARIES in parallel — `cargo test` runs them strictly one at a time,
      # which serialized ~20 integration suites. Doctests don't run under nextest; the --doc pass
      # behind it keeps them gated.
      - run: cargo nextest run --workspace
      - run: cargo test --workspace --doc
      # SU.2 (sustainment): the intrinsic parity matrix vs the COMMITTED BOSL2 pin, rendered into the
      # job summary so a drift is READ, not excavated from logs. The hard gate is the
      # tests/intrinsic_matrix.rs integration test in the nextest run above — this step makes the same
      # verdict visible (and fails redundantly on drift, exit-code preserved through the pipe).
      - name: Intrinsic matrix → job summary
        run: set -o pipefail; cargo run --quiet --bin fab -- intrinsics --md | tee -a "$GITHUB_STEP_SUMMARY"
      # scad-rs (fab-lang) ratchet lane: pedantic + missing_docs + the determinism bans already ride
      # the workspace clippy above; this pass adds --all-features (`trace`) so the observability
      # wiring stays lint-clean too. Its tests ride the workspace nextest run (trace only un-gates
      # spans, it changes no behavior) — the old duplicate `cargo test -p fab-lang` is gone.
      - run: cargo clippy -p fab-lang --all-targets --all-features -- -D warnings
      # Parser/lexer coverage gate: LINE + FUNCTION coverage, SCOPED to the lexer + parser modules. A
      # DELIBERATE exception (chotchki), NOT a blanket workspace policy — an unexercised branch in a
      # lexer/parser is a silent mis-tokenization. `-p fab-lang` measures the WHOLE crate, which since
      # bootstrap absorbed the evaluator + geometry + JIT + caches (exercised by the fab-scad
      # differential suite, NOT unit-tested here); `--ignore-filename-regex` narrows the gate back to
      # what it was built for (`src/eval/` + every top-level `src/*.rs`; only `lexer/` + `parser/` stay).
      # 99 not 100: the no-panic doctrine (unwrap/expect/panic/unreachable all denied) keeps a handful of
      # PROVABLY-unreachable defensive guards — a `#[non_exhaustive]` catch-all, an always-`Some` fallback
      # — uncoverable without a panic the ban forbids. Regions are already ungated for the same reason
      # (infallible-in-context `?` arms); the 1% line/function slack is that carve-out at line level.
      - run: cargo llvm-cov -p fab-lang --ignore-filename-regex 'src/eval/|src/[a-z_]+\.rs$' --fail-under-lines 99 --fail-under-functions 99
      # fab-jit (I.8) rides the workspace lint + nextest steps; its suite IS the fast==JIT
      # bit-identity gate (+ the speedup benchmark).

  # Kani proofs on the evaluator kernels (I.7): panic-freedom on the exact loop that runs untrusted
  # SCAD — range termination, stack pop/pop discipline, tessellation index bounds, guarded shifts. A
  # SEPARATE job on ubuntu (kani's home platform; fab-lang is pure Rust so it builds anywhere) because
  # kani's CBMC toolchain is a heavy install, like the fuzz lane — it must not slow the main macOS build.
  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          working-directory: lang

  # J.1.2 — miri on the pure-Rust MockBackend: proves the interface glue (tessellate → backend ops →
  # mesh) is UB-free. miri can't cross the Manifold FFI, so it runs the MOCK; the `geometry` feature
  # pulls fab-lang's Mesh WITHOUT the OS-heavy native deps (reqwest/clap/rayon choke miri). `--lib`
  # keeps it off the native/kernel-only integration tests.
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri test -p fab-scad --no-default-features --features geometry --lib backend

  # J.1.2 — ASAN on the REAL Manifold backend: proves the FFI marshalling (Rust ↔ Manifold C++) is
  # memory-clean. The COMPLEMENT to miri — ASAN instruments the binary FFI boundary miri structurally
  # can't see. On macOS because that's where the Manifold C++ kernel builds (matching the main job).
  asan:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
      - run: >
          RUSTFLAGS="-Zsanitizer=address"
          cargo test -p fab-scad --features "geometry kernel"
          --target $(rustc -vV | sed -n 's/host: //p')
          --lib backend::tests::manifold_backend_interface

  # The wasm BOOT GATE on every push — the W.3.10 lesson, learned twice in one day: the geom
  # worker's panic surface is invisible to every native gate above (web-v0.13.0's std::time panic
  # sat green through the whole matrix and died in a real browser; the P.2 probe repeated the
  # trick). Build the bundle LEAN (no wasm-opt/brotli — size gates the release, not boot) and
  # require the sourceless demo to render end-to-end THROUGH the geom worker in headless Chrome.
  # Mirrors release-web.yml's gate; a failure here means the release gate would fail too.
  boot-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git submodule update --init libs/BOSL2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM 21 + lld + libc++ (the worker's C++ kernel)
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21
          sudo apt-get install -y lld-21 libc++-21-dev libc++abi-21-dev
      - name: Install wasm-bindgen (lockfile-pinned)
        run: |
          V=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | cut -d'"' -f2)
          cargo install wasm-bindgen-cli --version "$V" --locked
      - name: Build the wasm app + geom worker
        run: cargo build --release --target wasm32-unknown-unknown -p fab-gui --lib -p fab-geom
      - name: Stage lean (unoptimized wasm boots fine; only the gate runs against it)
        run: |
          set -euo pipefail
          STAGE=target/fab-gui/stage && mkdir -p "$STAGE/geom"
          wasm-bindgen --target web --no-typescript --out-name fab_gui --out-dir "$STAGE" \
            target/wasm32-unknown-unknown/release/fab_gui.wasm
          wasm-bindgen --target web --no-typescript --out-name fab_geom --out-dir "$STAGE/geom" \
            target/wasm32-unknown-unknown/release/fab_geom.wasm
          cp packaging/web/geom-worker.js "$STAGE/geom/"
          python3 packaging/web/pack_scad_libs.py "$STAGE/libs.json"
          cp gui/web/index.html "$STAGE/index.html"
      - name: Boot the bundle in Chrome
        run: |
          STAGE=target/fab-gui/stage
          (cd "$STAGE" && python3 -m http.server 8899 &>/dev/null &)
          sleep 1
          # SwiftShader software WebGL2 (no GPU on the runner); REAL wall-clock poll — virtual time
          # races the geom worker's threads (the fab-web A-phase lesson).
          google-chrome --headless=new --no-sandbox --enable-logging=stderr \
            --enable-unsafe-swiftshader --use-gl=angle --use-angle=swiftshader-webgl \
            --window-size=1000,700 \
            "http://127.0.0.1:8899/index.html" 2> /tmp/console.log &
          CHROME=$!
          for i in $(seq 1 45); do
            sleep 2
            grep -qE "fab-gui render complete: [1-9]" /tmp/console.log && break
            grep -qE "RuntimeError|panicked|could not grow" /tmp/console.log && break
          done
          kill $CHROME 2>/dev/null || true
          if grep -qE "RuntimeError|panicked|could not grow" /tmp/console.log; then
            echo "::error::bundle failed to boot"; grep -E "RuntimeError|panicked|could not grow" /tmp/console.log | head -5; exit 1
          fi
          grep -qE "fab-gui render complete: [1-9]" /tmp/console.log \
            || { echo "::error::demo never rendered through the geom worker"; tail -30 /tmp/console.log; exit 1; }
          echo "boot gate: OK (bundle boots + kernel renders the demo)"
