# The web channel (18.8): build the fab-web wasm bundle and attach it to a GitHub release —
# the artifact hotchkiss-io's build.rs fetches (contract: docs/web-bundle.md).
# Tag `web-vX.Y.Z` → prerelease with fab-web-X.Y.Z.tar.gz. Manual dispatch → CI artifact only.
# Payload: the web/ crate (fab-web). NOTE: no submodules on checkout — the wasm build needs none.
name: release-web

on:
  workflow_dispatch:
  push:
    tags: ["web-v*"]

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # The Manifold kernel's wasm-uu build needs LLVM 20+ with wasm-ld; ubuntu-24.04 ships 18.
      - name: Install LLVM 21 + lld + libc++
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21
          # wasm-cxx-shim's probe wants clang++ AND libc++ headers under the same prefix.
          sudo apt-get install -y lld-21 libc++-21-dev libc++abi-21-dev
      - name: Install bundle tools (wasm-bindgen pinned to the lockfile, PINNED binaryen, brotli)
        run: |
          V=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | cut -d'"' -f2)
          cargo install wasm-bindgen-cli --version "$V" --locked
          # apt's binaryen mangled wasm-bindgen's externref table (web-v0.1.0 died at init with
          # "Table.grow could not grow" — binaryen#4711 / wasm-bindgen#4528). Pin a modern release.
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_130/bin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y brotli
      - name: Build the wasm app
        run: cargo build -p fab-web --release --target wasm32-unknown-unknown
      - name: Stage the bundle (web-bundle.md contract)
        run: |
          set -euo pipefail
          case "$GITHUB_REF" in
            refs/tags/web-v*) VERSION="${GITHUB_REF_NAME#web-v}" ;;
            *) VERSION="dev-${GITHUB_SHA::7}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          STAGE=target/fab-web/stage && mkdir -p "$STAGE"
          wasm-bindgen --target web --no-typescript --out-name fab_web --out-dir "$STAGE" \
            target/wasm32-unknown-unknown/release/fab_web.wasm
          # Explicit feature flags defend against any binaryen too old to read the feature section.
          wasm-opt -Oz --enable-reference-types --enable-bulk-memory \
            -o "$STAGE/fab_web_bg.wasm.opt" "$STAGE/fab_web_bg.wasm"
          mv "$STAGE/fab_web_bg.wasm.opt" "$STAGE/fab_web_bg.wasm"
          brotli -q 11 -k "$STAGE/fab_web_bg.wasm"
          gzip -9 -k "$STAGE/fab_web_bg.wasm"
          cp packaging/web/index.reference.html "$STAGE/"
          python3 - "$STAGE" "$VERSION" <<'EOF'
          import hashlib, json, os, sys
          stage, version = sys.argv[1], sys.argv[2]
          sha = {f: hashlib.sha256(open(os.path.join(stage, f), 'rb').read()).hexdigest()
                 for f in sorted(os.listdir(stage))}
          json.dump({"version": version, "entry": "fab_web.js", "wasm": "fab_web_bg.wasm", "sha256": sha},
                    open(os.path.join(stage, "manifest.json"), "w"), indent=1)
          EOF
          mkdir -p target/fab-web/out
          tar -czf "target/fab-web/out/fab-web-${VERSION}.tar.gz" -C "$STAGE" .
          ls -la target/fab-web/out/
      # BOOT GATE (the web-v0.1.0 lesson: never release an artifact nobody executed). Serve the
      # exact staged bundle, load ?demo in headless Chrome, fail on any panic/RuntimeError and
      # require the demo model to report loaded.
      - name: Boot the bundle in Chrome
        run: |
          STAGE=target/fab-web/stage
          cp packaging/web/index.reference.html "$STAGE/index.html"
          (cd "$STAGE" && python3 -m http.server 8899 &>/dev/null &)
          sleep 1
          google-chrome --headless=new --no-sandbox --enable-logging=stderr \
            --virtual-time-budget=35000 --window-size=1000,700 \
            --screenshot=/tmp/boot-gate.png "http://127.0.0.1:8899/index.html?demo&bed=40" 2> /tmp/console.log || true
          if grep -qE "RuntimeError|panicked|could not grow" /tmp/console.log; then
            echo "::error::bundle failed to boot"; grep -E "RuntimeError|panicked|could not grow" /tmp/console.log | head -5; exit 1
          fi
          grep -q "loaded demo.stl" /tmp/console.log || { echo "::error::demo model never loaded"; tail -20 /tmp/console.log; exit 1; }
          # The KERNEL gate: the 45mm demo on a 40mm bed must produce a real auto-plan in-browser.
          grep -qE "auto-plan: [1-9]" /tmp/console.log || { echo "::error::kernel never planned"; tail -20 /tmp/console.log; exit 1; }
          echo "boot gate: OK (bundle boots + kernel plans)"
      - uses: actions/upload-artifact@v4
        with:
          name: fab-web-${{ env.VERSION }}
          path: target/fab-web/out/*.tar.gz
          if-no-files-found: error
      - name: Release (tags only)
        if: startsWith(github.ref, 'refs/tags/web-v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: target/fab-web/out/*.tar.gz
          body: |
            fab-web bundle — the wasm app hotchkiss-io bakes into its special page.
            Contract: docs/web-bundle.md (ES-module glue + wasm + .br/.gz + manifest.json).
