[package]
name = "fab-scad"
version = "0.1.0"
edition = "2021"
description = "Workflow layer around OpenSCAD: render, slice, output, publish"
license = "MIT"
repository = "https://github.com/chotchki/fab-scad"

[[bin]]
name = "fab"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
