<!-- Reference loader for the fab-web bundle — CRIB, don't ship: the site's special page owns
     the real document (headers, chrome, canvas sizing). Two load-bearing pieces:
     1. <canvas id="fab-web"> MUST exist before init() — the app binds to it (missing = panic);
        size the canvas's parent, fit_canvas_to_parent tracks it.
     2. The init().catch: winit exits App::run via a control-flow JS exception that would
        otherwise read as a crash. -->
<!doctype html>
<meta charset="utf-8">
<title>fab</title>
<style>html,body{margin:0;height:100%}canvas{display:block;width:100%;height:100%}</style>
<!-- data-inset-top: px of page chrome overlaying the canvas top-left (default 44) -->
<!-- data-base: URL prefix for the bundle's members (default: document-relative). REQUIRED
     when the page URL sits outside the bundle dir, e.g. versioned mounts. -->
<canvas id="fab-web" data-inset-top="44" data-base="./"></canvas>
<script type="module">
  import init from './fab_web.js';
  init().catch(e => {
    if (!`${e}`.includes('Using exceptions for control flow')) console.error('INIT ERROR:', e);
  });
</script>
