# The web channel (W.3.7): build the fab-gui wasm bundle and attach it to a GitHub release —
# the artifact hotchkiss-io's build.rs fetches (contract: docs/web-embed.md).
# Tag `web-vX.Y.Z` → the Latest release with fab-gui-X.Y.Z.tar.gz. Manual dispatch → CI artifact only.
# A product `vX.Y.Z` tag (W.2.2.5) ALSO fires this — the wasm bundle joins release-native's
# dmg+exe on the tag's one release. The site keeps pinning web-v* tags; nothing moves for it.
# Payload: the ONE fab-gui app (desktop + web from one codebase, W.3) + the fab-geom kernel worker.
# The fab-web payload + the OpenSCAD side-module are GONE — scad-rs+Manifold render everywhere now.
name: release-web

on:
  workflow_dispatch:
  push:
    tags: ["web-v*", "v*"]

permissions:
  contents: write

jobs:
  # AM.2 — defense-in-depth behind the tag ruleset ("release tags require green CI", repo ruleset
  # 19646314): a red tag can't even be PUSHED, so this gate normally sees green instantly. It exists
  # for the ruleset's failure modes (deleted/bypassed ruleset, API-created tags) — a release must
  # never package from a commit whose CI is red. Non-tag runs (manual dispatch = CI artifacts only,
  # no publish) pass through ungated.
  gate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Require green CI on the tagged commit
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "not a tag — no publish happens, no gate needed"
            exit 0
          fi
          runs=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs?per_page=100" \
            --paginate --jq '.check_runs[] | "\(.name)=\(.conclusion)"')
          fail=0
          for c in build kani miri asan boot-gate; do
            if ! grep -qx "$c=success" <<< "$runs"; then
              echo "::error::required CI check '$c' is not green on $GITHUB_SHA — release blocked"
              fail=1
            fi
          done
          exit "$fail"

  bundle:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # libs/ only (BOSL2 pin for the lib pack) — models/ is a separate private-ish submodule
      # and the wasm build needs neither it nor scad-lib beyond the working tree.
      - run: git submodule update --init libs/BOSL2
      # NIGHTLY + rust-src: the geom worker is THREADED (W.6.2), which needs -Zbuild-std to rebuild std
      # with atomics/shared-memory. The app itself is stable-clean; nightly builds it fine (superset).
      # Pin a date here if a nightly regression ever bites — the boot + save e2e gates below would catch it.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Install bundle tools (wasm-bindgen pinned to the lockfile, PINNED binaryen, brotli)
        run: |
          V=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | cut -d'"' -f2)
          cargo install wasm-bindgen-cli --version "$V" --locked
          # apt's binaryen mangled wasm-bindgen's externref table (web-v0.1.0 died at init with
          # "Table.grow could not grow" — binaryen#4711 / wasm-bindgen#4528). Pin a modern release.
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_130/bin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y brotli
      # Both crates are pure-Rust wasm now (the C++ Manifold kernel was cut at M.7.4 — no LLVM). Two
      # SEPARATE builds because the geom worker needs different RUSTFLAGS + build-std than the app:
      #  - fab-gui --lib: the cdylib app, main-thread bevy_egui, NO threading → plain wasm.
      #  - fab-geom: the THREADED geom worker (W.6.2). fab-manifold `par` over wasm-bindgen-rayon needs
      #    build-std + shared-memory link-args so wasm-ld emits an IMPORTED SHARED memory — else
      #    initThreadPool's postMessage of the Memory to the rayon sub-workers throws DataCloneError and
      #    no geometry renders. The __tls_*/__heap_* exports are what wasm-bindgen's thread transform needs
      #    ("failed to find __heap_base" otherwise). Mirrors gui/web/build-wasm.sh exactly.
      - name: Build the wasm app (serial) + geom worker (threaded)
        run: |
          set -euo pipefail
          cargo build --release --target wasm32-unknown-unknown -p fab-gui --lib
          RUSTFLAGS='-C target-feature=+atomics,+bulk-memory,+mutable-globals -C link-arg=--shared-memory -C link-arg=--max-memory=1073741824 -C link-arg=--import-memory -C link-arg=--export=__wasm_init_tls -C link-arg=--export=__tls_size -C link-arg=--export=__tls_align -C link-arg=--export=__tls_base -C link-arg=--export=__heap_base -C link-arg=--export=__heap_end' \
            cargo build -p fab-geom --release --target wasm32-unknown-unknown \
            --features par -Z build-std=panic_abort,std
      - name: Stage the bundle (docs/web-embed.md contract)
        run: |
          set -euo pipefail
          case "$GITHUB_REF" in
            refs/tags/web-v*) VERSION="${GITHUB_REF_NAME#web-v}" ;;
            refs/tags/v*)     VERSION="${GITHUB_REF_NAME#v}" ;;
            *) VERSION="dev-${GITHUB_SHA::7}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          STAGE=target/fab-gui/stage && mkdir -p "$STAGE"

          # The app: cdylib → wasm-bindgen (ES module) → wasm-opt -Oz → brotli/gzip.
          wasm-bindgen --target web --no-typescript --out-name fab_gui --out-dir "$STAGE" \
            target/wasm32-unknown-unknown/release/fab_gui.wasm
          # Explicit feature flags defend against any binaryen too old to read the feature section.
          wasm-opt -Oz --enable-reference-types --enable-bulk-memory \
            -o "$STAGE/fab_gui_bg.wasm.opt" "$STAGE/fab_gui_bg.wasm"
          mv "$STAGE/fab_gui_bg.wasm.opt" "$STAGE/fab_gui_bg.wasm"
          brotli -q 11 -kf "$STAGE/fab_gui_bg.wasm"
          gzip -9 -kf "$STAGE/fab_gui_bg.wasm"

          # The geometry worker (W.3.6): the kernel-only fab-geom wasm in its own Web Worker (THREADED).
          mkdir -p "$STAGE/geom"
          wasm-bindgen --target web --no-typescript --out-name fab_geom --out-dir "$STAGE/geom" \
            target/wasm32-unknown-unknown/release/fab_geom.wasm
          # wasm-bindgen-rayon's workerHelpers.js does import('../../..') — a bundler/package.json assumption
          # that resolves to the out-DIR, not a module. Raw --target web has no bundler, so point the
          # sub-worker's dynamic import at the real entry; else every rayon sub-worker fails to load and
          # initThreadPool HANGS (no error — the pool just never reports ready). Mirrors build-wasm.sh.
          for wh in "$STAGE"/geom/snippets/wasm-bindgen-rayon-*/src/workerHelpers.js; do
            [[ -f "$wh" ]] && sed -i "s#import('\.\./\.\./\.\.')#import('../../../fab_geom.js')#" "$wh"
          done
          # --enable-threads preserves the atomics/shared-memory ops through the -Oz pass (else wasm-opt
          # would strip them and the shared memory would be invalid).
          wasm-opt -Oz --enable-threads --enable-reference-types --enable-bulk-memory \
            -o "$STAGE/geom/fab_geom_bg.wasm.opt" "$STAGE/geom/fab_geom_bg.wasm"
          mv "$STAGE/geom/fab_geom_bg.wasm.opt" "$STAGE/geom/fab_geom_bg.wasm"
          brotli -q 11 -kf "$STAGE/geom/fab_geom_bg.wasm"
          gzip -9 -kf "$STAGE/geom/fab_geom_bg.wasm"
          cp packaging/web/geom-worker.js "$STAGE/geom/"

          # The scad LIB PACK: BOSL2 + scad-lib + the web demo, one JSON the app fetches once and
          # computes each model's include closure from (served at the bundle root).
          python3 packaging/web/pack_scad_libs.py "$STAGE/libs.json"

          # The reference loader (a crib for the host — the site owns the real document).
          cp gui/web/index.html "$STAGE/index.reference.html"

          # Contract manifest: version + entry + per-file sha256 (the site asserts it at build time).
          python3 - "$STAGE" "$VERSION" <<'EOF'
          import hashlib, json, os, sys
          stage, version = sys.argv[1], sys.argv[2]
          sha = {}
          for root, _, names in os.walk(stage):
              for n in sorted(names):
                  rel = os.path.relpath(os.path.join(root, n), stage)
                  sha[rel] = hashlib.sha256(open(os.path.join(root, n), "rb").read()).hexdigest()
          json.dump({"version": version, "entry": "fab_gui.js", "wasm": "fab_gui_bg.wasm", "sha256": sha},
                    open(os.path.join(stage, "manifest.json"), "w"), indent=1)
          EOF

          mkdir -p target/fab-gui/out
          tar -czf "target/fab-gui/out/fab-gui-${VERSION}.tar.gz" -C "$STAGE" .
          ls -la "$STAGE" "target/fab-gui/out/"
          echo "app wasm (brotli): $(du -h "$STAGE/fab_gui_bg.wasm.br" | cut -f1)"
      # BOOT GATE (the web-v0.1.0 lesson: never release an artifact nobody executed). Serve the exact
      # staged bundle, boot fab-gui in headless Chrome, fail on any panic/RuntimeError, and require the
      # sourceless-boot DEMO to render end-to-end THROUGH the geom worker (the whole point of the bundle).
      - name: Boot the bundle in Chrome
        run: |
          STAGE=target/fab-gui/stage
          cp "$STAGE/index.reference.html" "$STAGE/index.html"
          # COOP/COEP is now REQUIRED, not just nice-to-have: the THREADED geom worker can't even
          # instantiate without SharedArrayBuffer (cross-origin isolation), so plain `http.server` would
          # fail the gate. dev-server.py sets both headers — the same headers the site serves in prod.
          python3 packaging/web/dev-server.py "$STAGE" 8899 &>/dev/null &
          sleep 1
          # SwiftShader software WebGL2 for bevy (no GPU on the runner). REAL wall-clock poll, not
          # --virtual-time-budget: the demo renders through the geom WORKER, and virtual time races real
          # worker threads (the fab-web A-phase lesson). Chrome stays up; we poll the console.
          google-chrome --headless=new --no-sandbox --enable-logging=stderr \
            --enable-unsafe-swiftshader --use-gl=angle --use-angle=swiftshader-webgl \
            --window-size=1000,700 \
            "http://127.0.0.1:8899/index.html" 2> /tmp/console.log &
          CHROME=$!
          for i in $(seq 1 45); do
            sleep 2
            grep -qE "fab-gui render complete: [1-9]" /tmp/console.log && break
            grep -qE "RuntimeError|panicked|could not grow" /tmp/console.log && break
          done
          kill $CHROME 2>/dev/null || true
          if grep -qE "RuntimeError|panicked|could not grow" /tmp/console.log; then
            echo "::error::bundle failed to boot"; grep -E "RuntimeError|panicked|could not grow" /tmp/console.log | head -5; exit 1
          fi
          grep -qE "fab-gui render complete: [1-9]" /tmp/console.log \
            || { echo "::error::demo never rendered through the geom worker"; tail -30 /tmp/console.log; exit 1; }
          echo "boot gate: OK (bundle boots + kernel renders the demo)"
      # SAVE-BACK ROUND-TRIP GATE (W.5.9): the staged bundle already carries index.html (copied above).
      # e2e-save.sh serves it behind the stub hotchkiss.io (COOP/COEP + a PUT recorder), boots headless
      # Chrome at ?model=…&e2e=save, and asserts the 3-variant PUT /media/<ref>/variants landed with the
      # session cookie — the whole save pipeline exercised in a browser, not just the sourceless demo.
      - name: Save round-trip in Chrome (W.5.9)
        run: bash packaging/web/e2e-save.sh target/fab-gui/stage 8898 180
      - uses: actions/upload-artifact@v4
        with:
          name: fab-gui-${{ env.VERSION }}
          path: target/fab-gui/out/*.tar.gz
          if-no-files-found: error
      - name: Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Full releases, not prereleases: the web bundle is ACTIVELY DOGFOODED (pre-1.0, but real —
          # hotchkiss-io fetches whatever's newest), so mark each the Latest release, not a hidden preview.
          prerelease: false
          make_latest: true
          files: target/fab-gui/out/*.tar.gz
          body: |
            fab-gui bundle — the wasm app hotchkiss-io bakes into its /3d/editor page.
            Contract: docs/web-embed.md (ES-module glue + wasm + .br/.gz + geom worker + libs.json + manifest.json).
