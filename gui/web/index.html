<!-- fab-gui wasm dev loader (W.3.5/W.3.7) — standalone (the hotchkiss.io page owns the real chrome).
     The load-bearing pieces, per docs/web-embed.md:
       1. <canvas id="fab-gui"> MUST exist before init() — the app binds to it (window_plugin); missing
          = panic. data-base points at the bundle members (geom/, libs.json); "" = document-relative.
       2. init().catch swallows winit's control-flow exception (App::run exits via a JS throw that
          would otherwise read as a crash).
       3. `fab-gui:ready` (CustomEvent on document) fires when the first UI frame paints — a real host
          removes its boot splash here; standalone we just log it. -->
<!doctype html>
<meta charset="utf-8">
<title>fab-gui — wasm</title>
<style>
  html, body { margin: 0; height: 100%; background: #0f182d; } /* navy viewport, pre-boot */
  canvas { display: block; width: 100%; height: 100%; }
</style>
<canvas id="fab-gui" data-base=""></canvas>
<script type="module">
  document.addEventListener('fab-gui:ready', () => console.info('fab-gui: ready'), { once: true });
  import init from './fab_gui.js';
  init().catch((e) => {
    if (!`${e}`.includes('Using exceptions for control flow')) console.error('fab-gui init:', e);
  });
</script>
