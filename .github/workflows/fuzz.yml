# Scheduled fuzzing of the fab-lang parser + lexer (the "fuzz-from-first-commit" doctrine, SPEC).
# Not a per-PR gate — a nightly campaign that persists+minimizes the corpus and, on a crash, fails
# LOUD and uploads the reproducer for the trophy log (lang/fuzz/TROPHIES.md).
name: fuzz

on:
  schedule:
    - cron: '0 6 * * *' # nightly, 06:00 UTC
  workflow_dispatch: {} # manual runs (pick a longer budget by editing -max_total_time)

concurrency:
  group: fuzz
  cancel-in-progress: false

jobs:
  fuzz:
    runs-on: ubuntu-latest
    env:
      # THE fix for the dead campaign: cargo-fuzz 0.13 defaults its sanitizer target to
      # x86_64-unknown-linux-MUSL on Linux. musl static-links libc, which ASan cannot instrument
      # ("sanitizer is incompatible with statically linked libc"), and the musl std isn't installed
      # ("can't find crate for `core`") — so every `cargo fuzz run` died at BUILD, fuzzing nothing.
      # Pin the host gnu target (dynamic libc, std present) so the sanitizer links. Every cargo-fuzz
      # invocation below passes --target "$FUZZ_TARGET".
      FUZZ_TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # BOSL2 — the seed corpus for eval/jit_diff is sliced from it
      # rust-src is precautionary insurance for -Zbuild-std (not the blocker — see FUZZ_TARGET above).
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Seed the eval/jit_diff corpora from ~1300 real BOSL2 function defs before fuzzing — starts the
      # campaign on dense, valid numeric/list bodies (took jit_diff coverage ~1k → ~13k on the first run)
      # instead of rediscovering SCAD syntax from raw bytes. No-op for parse/lex (their corpora are curated).
      - name: seed fuzz corpora from BOSL2
        run: cargo run -p fab-lang --example seed_fuzz_from_bosl2
      # A crash makes `cargo fuzz run` exit non-zero → the job FAILS → the reproducer is uploaded and
      # goes into TROPHIES.md as a regression test. Budgets are per-target wall-clock.
      - name: fuzz parse
        working-directory: lang
        run: cargo fuzz run parse --target "$FUZZ_TARGET" -- -max_total_time=300 -rss_limit_mb=2048
      - name: fuzz lex
        working-directory: lang
        run: cargo fuzz run lex --target "$FUZZ_TARGET" -- -max_total_time=120 -rss_limit_mb=2048
      # The evaluator (miri can't be its checker here — this + ASan is): parse → eval → geometry → mesh,
      # exercising the value machinery + both iterative Drops. The eval target sets FAB_EVAL_BUDGET (Q.5) so a
      # runaway comprehension can't hang; -max_len keeps exec/s high (real programs are small — huge inputs
      # are slow garbage that adds no coverage), -timeout is the belt.
      - name: fuzz eval
        working-directory: lang
        run: cargo fuzz run eval --target "$FUZZ_TARGET" -- -max_total_time=300 -rss_limit_mb=2048 -max_len=4096 -timeout=10
      # The JIT vs the interpreter, BITWISE — the only tool that executes the JIT's native code (miri/Kani
      # can't). A divergence is a doctrine-#36 violation, a crash under ASan is a memory bug in the JIT seam.
      # No in-target size guard (Q.7 made compile crash-proof — a deep body DECLINES, never overflows); -max_len
      # is the THROUGHPUT knob (a numeric function is small, so a large input is slow garbage, not coverage).
      - name: fuzz jit_diff
        working-directory: lang
        run: cargo fuzz run jit_diff --target "$FUZZ_TARGET" -- -max_total_time=300 -rss_limit_mb=2048 -max_len=4096 -timeout=10
      # Y.7 — the GEOMETRY-LOWERING seam (fab-scad fuzz crate at the repo root): evaluate_geometry ->
      # build_geo/build_2d through the REAL Manifold kernel, so the kernel's get_unchecked unsafe + the
      # X.4 2D-hull path get ASan on fuzzer geometry. Heavier per-exec than the lang targets (real CSG),
      # so a shorter budget + higher rss/timeout + a small max_len (a tiny program can ask for a huge $fn).
      # --fuzz-dir fuzz: cargo-fuzz would otherwise find lang/fuzz. Seed from the eval corpus (programs
      # that actually build geometry). FAB_EVAL_BUDGET is set inside the target.
      - name: fuzz geo_lower
        run: cargo fuzz run geo_lower --fuzz-dir fuzz --target "$FUZZ_TARGET" lang/fuzz/corpus/eval -- -max_total_time=240 -rss_limit_mb=4096 -max_len=2048 -timeout=25
      # Minimize the accumulated corpus to a coverage-minimal set + publish it, so the next run (and
      # anyone reproducing locally) starts from the best-known corpus.
      - name: minimize corpus
        if: always()
        working-directory: lang
        run: |
          cargo fuzz cmin parse --target "$FUZZ_TARGET"
          cargo fuzz cmin lex --target "$FUZZ_TARGET"
          cargo fuzz cmin eval --target "$FUZZ_TARGET"
          cargo fuzz cmin jit_diff --target "$FUZZ_TARGET"
      - name: upload minimized corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fab-lang-fuzz-corpus
          path: lang/fuzz/corpus
          retention-days: 30
      - name: upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fab-lang-fuzz-crashes
          path: |
            lang/fuzz/artifacts
            fuzz/artifacts
          retention-days: 90
